<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Jakarta Runner — Training Plan</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0b; --bg2:#0f1211; --surf:#141816; --surf2:#1b201d; --surf3:#252b26;
    --border:#252c26; --border2:#2f3831;
    --text:#eef2ee; --muted:#7a8a7c; --muted2:#4a5a4c; --dim:#3a453c;
    --run:#4eff91; --runBg:#0e1f14; --runDim:#1a4a2e;
    --mob:#ffa94d; --mobBg:#1e1408; --mobDim:#4a3010;
    --str:#5ab0f5; --strBg:#0a1824; --strDim:#0e2840;
    --rec:#a99bff; --recBg:#0f0e1f;
    --thr:#ffa94d;
    --race:#ff6b6b; --raceBg:#1f0a0a;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Plus Jakarta Sans',system-ui,sans-serif;
    --serif:'Fraunces',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;}
  body{min-height:100vh;line-height:1.5;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  a{color:inherit;text-decoration:none;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared-data.jsx"></script>

<script type="text/babel">
const { WEEKS, PHASES, DAY_TYPES, DAY_ABBR, TODAY_WEEK_ID, TODAY_DAY_INDEX,
        DAYS_TO_10K, DAYS_TO_HM, getTodayWeek, getTodayDay } = window;

// ——— sessions per-day inline detail
const SESSION_DETAIL = {
  'intv': { wu:'2km @ 6:35 + 4×100m strides', main:'6 × 800m @ 4:50/km · 90s jog rest', cd:'1.5km @ 6:40',
            pace:'4:50', rest:'90s', hr:'155–160', ceiling:'170',
            rule:'HR >170 → slow down' },
};

// ——— tiny storage helper
const useLocal = (key, init) => {
  const [v, setV] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch(e){ return init; }
  });
  React.useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch(e){} }, [key, v]);
  return [v, setV];
};

const GLYPH = { rest:'·', easy:'E', rec:'R', intv:'I', thr:'T', lng:'L', race:'★' };

// ============== HEADER =================
function ModeBar({ mode, setMode }) {
  const modes = [
    { k: 'run', label: 'RUN PLAN', c: 'var(--run)' },
    { k: 'mob', label: 'MOBILITY', c: 'var(--mob)' },
    { k: 'str', label: 'STRENGTH', c: 'var(--str)' },
  ];
  return (
    <div style={{
      display:'flex', borderBottom:'1px solid var(--border)',
      background:'var(--bg2)', position:'sticky', top:0, zIndex:20,
    }}>
      {modes.map(m => (
        <button key={m.k} onClick={() => setMode(m.k)} style={{
          flex:1, padding:'13px 8px',
          fontFamily:'var(--mono)', fontSize:10, letterSpacing:1.8, fontWeight:500,
          color: mode===m.k ? m.c : 'var(--muted2)',
          borderBottom: mode===m.k ? `2px solid ${m.c}` : '2px solid transparent',
          transition:'color .2s',
        }}>{m.label}</button>
      ))}
    </div>
  );
}

// ============== TODAY CARD (compact) =================
function TodayCard({ completed, onToggle }) {
  const day = getTodayDay();
  const week = getTodayWeek();
  const meta = DAY_TYPES[day.t];
  const d = SESSION_DETAIL[day.t] || {};
  const done = completed[`${week.id}-${TODAY_DAY_INDEX}`];

  return (
    <div style={{
      background: meta.bg, border:`1px solid ${meta.color}44`,
      borderRadius:6, padding:'14px 16px',
      opacity: done ? 0.55 : 1, transition:'opacity .2s',
    }}>
      <div style={{
        display:'flex', justifyContent:'space-between', alignItems:'baseline',
        fontFamily:'var(--mono)', fontSize:10, letterSpacing:1.6,
        marginBottom:8,
      }}>
        <span style={{color:meta.color}}>▸ TUE · TODAY</span>
        <span style={{color:'var(--muted)'}}>W{week.id} · {day.t.toUpperCase()}</span>
      </div>

      <div style={{
        fontFamily:'var(--serif)', fontSize:26, fontWeight:300,
        lineHeight:1.05, letterSpacing:'-0.01em', marginBottom:2,
      }}>
        6 × <em style={{fontStyle:'italic',color:meta.color}}>800m</em>
      </div>
      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',marginBottom:12}}>
        Intervals · ≈10km · 60–70 min
      </div>

      <div style={{
        display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:1,
        background:'var(--border)', marginBottom:12,
      }}>
        {[
          {l:'PACE',  v:'4:50',   u:'/km',  c:meta.color},
          {l:'REST',  v:'90s',    u:'jog'},
          {l:'HR',    v:'155-160', u:'bpm'},
        ].map((m,i)=>(
          <div key={i} style={{background:meta.bg,padding:'8px 10px'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:8.5,color:'var(--muted2)',letterSpacing:1.2}}>{m.l}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:600,color:m.c||'var(--text)',marginTop:2}}>
              {m.v} <span style={{fontSize:9,color:'var(--muted)',fontWeight:400}}>{m.u}</span>
            </div>
          </div>
        ))}
      </div>

      <div style={{fontFamily:'var(--mono)',fontSize:10.5,color:'var(--muted)',lineHeight:1.65,marginBottom:10}}>
        <div><span style={{color:'var(--muted2)'}}>WU&nbsp;</span>2km @ 6:35 + 4×100m strides</div>
        <div><span style={{color:'var(--muted2)'}}>MAIN</span> 6×800m @ 4:50/km · 90s jog</div>
        <div><span style={{color:'var(--muted2)'}}>CD&nbsp;</span>1.5km @ 6:40</div>
      </div>

      <div style={{
        fontFamily:'var(--mono)',fontSize:9.5,color:'var(--race)',
        padding:'6px 9px',background:'var(--bg)',borderRadius:3,
        marginBottom:10, lineHeight:1.4,
      }}>
        ⚠ HR override: if HR &gt;170 before rep ends, slow down.
      </div>

      <button onClick={onToggle} style={{
        width:'100%', padding:'9px',
        background: done ? 'transparent' : meta.color,
        border: done ? `1px solid ${meta.color}` : 'none',
        color: done ? meta.color : 'var(--bg)',
        fontFamily:'var(--mono)', fontSize:10, letterSpacing:1.8, fontWeight:600,
        borderRadius:3,
      }}>
        {done ? '✓ DONE · TAP TO UNDO' : 'MARK COMPLETE'}
      </button>
    </div>
  );
}

// ============== COUNTDOWN PAIR =================
function Countdowns() {
  return (
    <div style={{
      display:'grid', gridTemplateColumns:'1fr 1fr', gap:1,
      background:'var(--border)', border:'1px solid var(--border)', borderRadius:6,
      overflow:'hidden',
    }}>
      {[
        { label:'LOMBOK 10K', date:'Jul 12', tgt:'Sub 48:00', n:DAYS_TO_10K, c:'var(--race)' },
        { label:'JAKARTA HM', date:'Oct 25', tgt:'Sub 1:45',  n:DAYS_TO_HM,  c:'var(--str)' },
      ].map((r,i)=>(
        <div key={i} style={{background:'var(--surf)',padding:'12px 14px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted2)',letterSpacing:1.5}}>{r.label}</div>
          <div style={{
            fontFamily:'var(--serif)',fontSize:30,fontWeight:300,color:r.c,
            lineHeight:1,marginTop:4,
          }}>{r.n}<span style={{fontSize:11,color:'var(--muted)',marginLeft:4}}>days</span></div>
          <div style={{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--muted)',marginTop:4}}>
            {r.date} · {r.tgt}
          </div>
        </div>
      ))}
    </div>
  );
}

// ============== PHASE TIMELINE =================
function PhaseTimeline() {
  const todayIdx = WEEKS.findIndex(w => w.id === TODAY_WEEK_ID);
  return (
    <div>
      <SectionHead label="PHASE TIMELINE" meta="28 weeks · Apr → Oct"/>
      <div>
        {PHASES.map((phase, pi) => {
          const phaseWeeks = WEEKS.filter(w => w.phase === phase.id);
          if (!phaseWeeks.length) return null;
          const isActive = phaseWeeks.some(w => w.id === TODAY_WEEK_ID);
          const isPast = phaseWeeks.every(w => WEEKS.indexOf(w) < todayIdx);
          const totalKm = phaseWeeks.reduce((s, w) => s + w.km, 0);
          const doneKm = phaseWeeks.reduce((s, w) => {
            const wi = WEEKS.indexOf(w);
            return s + (wi < todayIdx ? w.km : 0);
          }, 0);
          const pct = totalKm ? (doneKm/totalKm)*100 : 0;

          return (
            <div key={phase.id} style={{
              display:'grid', gridTemplateColumns:'18px 1fr',
              gap:10, padding:'10px 0',
              borderTop: pi>0 ? '1px solid var(--border)' : 'none',
              opacity: isPast ? 0.45 : 1,
            }}>
              <div style={{position:'relative'}}>
                <div style={{
                  position:'absolute', left:6, top:5,
                  width:8, height:8, borderRadius:'50%',
                  background: isActive ? 'var(--run)' : isPast ? 'var(--muted2)' : 'var(--bg)',
                  border: `2px solid ${isActive ? 'var(--run)' : isPast ? 'var(--muted2)' : 'var(--dim)'}`,
                }}/>
                {pi < PHASES.length - 1 && (
                  <div style={{
                    position:'absolute', left:9, top:18, bottom:-10,
                    width:1, background:'var(--border2)',
                  }}/>
                )}
              </div>
              <div>
                <div style={{
                  display:'flex', justifyContent:'space-between', alignItems:'baseline',
                  gap:8, flexWrap:'wrap',
                }}>
                  <div>
                    <span style={{
                      fontFamily:'var(--mono)', fontSize:9, letterSpacing:1.5,
                      color: isActive ? 'var(--run)' : 'var(--muted2)',
                    }}>{isActive ? 'NOW' : isPast ? 'DONE' : 'UPCOMING'}</span>
                    <span style={{
                      fontFamily:'var(--sans)', fontSize:13, fontWeight:500,
                      color:'var(--text)', marginLeft:10,
                    }}>{phase.name}</span>
                  </div>
                  <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)'}}>
                    Wk {phase.startWk}–{phase.endWk} · {totalKm}km
                  </span>
                </div>
                {(isActive || isPast) && (
                  <div style={{
                    height:2, background:'var(--surf2)', borderRadius:1, marginTop:6,
                    overflow:'hidden',
                  }}>
                    <div style={{
                      height:'100%', width: `${pct}%`,
                      background: isActive ? 'var(--run)' : 'var(--muted2)',
                    }}/>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============== VOLUME CHART =================
function VolumeChart() {
  const todayIdx = WEEKS.findIndex(w => w.id === TODAY_WEEK_ID);
  const maxKm = 68;
  const H = 80;
  return (
    <div>
      <SectionHead label="WEEKLY VOLUME" meta="peak 68km · avg 47km"/>
      <div style={{display:'flex',alignItems:'flex-end',gap:2,height:H,marginBottom:6}}>
        {WEEKS.map((w, i) => {
          const isToday = w.id === TODAY_WEEK_ID;
          const past = i < todayIdx;
          const h = Math.max(2, (w.km / maxKm) * H);
          let color = 'var(--dim)';
          if (w.race) color = 'var(--race)';
          else if (isToday) color = 'var(--run)';
          else if (past) color = 'var(--muted)';
          return (
            <div key={i} title={`Wk ${w.id}: ${w.km}km`} style={{
              flex:1, height:h, background:color,
              borderRadius:'1px 1px 0 0',
              opacity: isToday ? 1 : past ? 0.85 : 0.5,
              position:'relative',
            }}>
              {w.race && (
                <div style={{
                  position:'absolute', top:-14, left:'50%', transform:'translateX(-50%)',
                  fontSize:9, color:'var(--race)',
                }}>★</div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{
        display:'flex', justifyContent:'space-between',
        fontFamily:'var(--mono)', fontSize:8.5, color:'var(--muted2)',
        letterSpacing:0.5, marginTop:4,
      }}>
        <span>RET</span><span>P1</span><span>P2</span><span>PEAK</span>
        <span style={{color:'var(--race)'}}>10K</span>
        <span>RESET</span><span>FOUND</span><span>HM PEAK</span><span>TAPER</span>
        <span style={{color:'var(--race)'}}>HM</span>
      </div>
    </div>
  );
}

// ============== SECTION HEAD =================
function SectionHead({ label, meta }) {
  return (
    <div style={{
      display:'flex', justifyContent:'space-between', alignItems:'baseline',
      padding:'0 0 10px', marginBottom:10,
      borderBottom:'1px solid var(--border)',
    }}>
      <span style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:2,color:'var(--muted)'}}>{label}</span>
      {meta && <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted2)'}}>{meta}</span>}
    </div>
  );
}

// ============== WEEKLY GRID (full plan) =================
function WeeklyGrid({ completed, setCompleted, detailOpen, setDetailOpen }) {
  const todayIdx = WEEKS.findIndex(w => w.id === TODAY_WEEK_ID);
  const maxKm = 68;

  return (
    <div>
      <SectionHead label="FULL GRID · 28 WEEKS × 7 DAYS" meta="tap a day for detail"/>
      <div style={{
        display:'grid',
        gridTemplateColumns:'minmax(36px,auto) minmax(68px,auto) minmax(32px,auto) repeat(7, minmax(28px,1fr)) minmax(42px,auto)',
        gap:3, alignItems:'center',
        fontFamily:'var(--mono)', fontSize:9, color:'var(--muted2)', letterSpacing:1,
        marginBottom:4,
      }}>
        <div>WK</div><div>DATES</div><div style={{textAlign:'right'}}>KM</div>
        {DAY_ABBR.map(d => <div key={d} style={{textAlign:'center'}}>{d}</div>)}
        <div style={{textAlign:'right'}}>VOL</div>
      </div>

      {PHASES.map(phase => {
        const ph = WEEKS.filter(w => w.phase === phase.id);
        if (!ph.length) return null;
        return (
          <React.Fragment key={phase.id}>
            <div style={{
              fontFamily:'var(--mono)', fontSize:9, letterSpacing:1.5,
              color:'var(--muted)', padding:'8px 0 5px',
              borderBottom:'1px solid var(--border)', marginBottom:4, marginTop:4,
              textTransform:'uppercase',
            }}>{phase.name}</div>

            {ph.map(w => {
              const wIdx = WEEKS.indexOf(w);
              const isToday = w.id === TODAY_WEEK_ID;
              const isPast = wIdx < todayIdx;
              return (
                <div key={w.id} style={{
                  display:'grid',
                  gridTemplateColumns:'minmax(36px,auto) minmax(68px,auto) minmax(32px,auto) repeat(7, minmax(28px,1fr)) minmax(42px,auto)',
                  gap:3, alignItems:'center', padding:'2px 0',
                  opacity: isPast ? 0.4 : 1,
                }}>
                  <div style={{
                    fontFamily:'var(--mono)', fontSize:12, fontWeight:600,
                    color: isToday ? 'var(--run)' : 'var(--text)',
                    fontVariantNumeric:'tabular-nums',
                  }}>
                    {w.id}{w.cutback && <span style={{color:'var(--muted)',fontWeight:400}}>↓</span>}
                  </div>
                  <div style={{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--muted2)'}}>{w.dates}</div>
                  <div style={{
                    fontFamily:'var(--mono)',fontSize:10, color:isToday?'var(--run)':'var(--muted)',
                    textAlign:'right', fontVariantNumeric:'tabular-nums',
                  }}>{w.km}</div>

                  {w.days.map((d, di) => {
                    const m = DAY_TYPES[d.t];
                    const key = `${w.id}-${di}`;
                    const isTodayCell = isToday && di === TODAY_DAY_INDEX;
                    const isDone = !!completed[key];
                    const isOpen = detailOpen === key;
                    return (
                      <button key={di} onClick={() => setDetailOpen(isOpen?null:key)} style={{
                        height:20, padding:0,
                        background: d.t === 'rest' ? 'var(--surf)' : m.color,
                        opacity: d.t === 'rest' ? 1 : (isDone ? 0.35 : 0.82),
                        border: isTodayCell
                          ? '2px solid var(--text)'
                          : isOpen
                            ? `2px solid ${m.color === 'var(--dim)' ? 'var(--text)' : m.color}`
                            : '1px solid var(--border2)',
                        borderRadius:2,
                        fontFamily:'var(--mono)', fontSize:8.5, fontWeight:600,
                        color: d.t === 'rest' ? 'var(--muted2)' : 'var(--bg)',
                        letterSpacing:0.3, lineHeight:1,
                      }} title={`${DAY_ABBR[di]}: ${d.s}`}>
                        {isDone ? '✓' : GLYPH[d.t]}
                      </button>
                    );
                  })}

                  <div style={{
                    height:10, background:'var(--surf)', borderRadius:1,
                    position:'relative', overflow:'hidden',
                  }}>
                    <div style={{
                      position:'absolute', left:0,top:0,bottom:0,
                      width:`${(w.km/maxKm)*100}%`,
                      background: w.race?'var(--race)':isToday?'var(--run)':'var(--muted)',
                      opacity: isPast?0.55:1,
                    }}/>
                  </div>
                </div>
              );
            })}
          </React.Fragment>
        );
      })}

      {/* Detail panel */}
      {detailOpen && (() => {
        const [wid, diStr] = detailOpen.split('-');
        const w = WEEKS.find(x => x.id === wid);
        const di = +diStr;
        const d = w.days[di];
        const m = DAY_TYPES[d.t];
        const isDone = !!completed[detailOpen];
        return (
          <div style={{
            marginTop:12,
            background:m.bg, border:`1px solid ${m.color}44`, borderRadius:4,
            padding:'12px 14px',
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.5,color:m.color}}>
                {m.label} · W{w.id} · {DAY_ABBR[di]}
              </div>
              <button onClick={() => setDetailOpen(null)} style={{
                fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',
              }}>✕</button>
            </div>
            <div style={{fontFamily:'var(--sans)',fontSize:13,color:'var(--text)',lineHeight:1.5}}>
              {d.l || d.s}
            </div>
            <button onClick={() => {
              setCompleted({...completed, [detailOpen]: !isDone});
            }} style={{
              marginTop:10, padding:'6px 12px', borderRadius:3,
              background: isDone ? 'transparent' : m.color,
              border: isDone ? `1px solid ${m.color}` : 'none',
              color: isDone ? m.color : 'var(--bg)',
              fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.5,fontWeight:600,
            }}>{isDone ? '✓ DONE' : 'MARK DONE'}</button>
          </div>
        );
      })()}

      {/* Legend */}
      <div style={{
        display:'flex', gap:10, flexWrap:'wrap',
        padding:'14px 0 0', marginTop:12,
        borderTop:'1px solid var(--border)',
      }}>
        {[
          { k:'E', l:'Easy', c:'var(--run)' },
          { k:'I', l:'Intervals', c:'var(--mob)' },
          { k:'T', l:'Threshold', c:'var(--thr)' },
          { k:'L', l:'Long', c:'var(--str)' },
          { k:'R', l:'Recovery', c:'var(--rec)' },
          { k:'★', l:'Race', c:'var(--race)' },
          { k:'·', l:'Rest', c:'var(--surf2)' },
        ].map((l,i) => (
          <div key={i} style={{
            display:'inline-flex',alignItems:'center',gap:5,
            fontFamily:'var(--mono)',fontSize:9.5,color:'var(--muted)',
          }}>
            <span style={{
              width:14,height:14,background:l.c,borderRadius:2,
              display:'inline-flex',alignItems:'center',justifyContent:'center',
              color: l.k==='·' ? 'var(--muted2)' : 'var(--bg)',
              fontSize:8, fontWeight:600,
            }}>{l.k}</span>{l.l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============== MOBILITY & STRENGTH (abbreviated) =================
function MobilityView() {
  return (
    <div style={{padding:'30px 0',color:'var(--muted)'}}>
      <div style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:300,color:'var(--text)',marginBottom:8}}>
        Full Mobility <em style={{fontStyle:'italic',color:'var(--mob)'}}>Regimen</em>
      </div>
      <p style={{fontFamily:'var(--mono)',fontSize:11,maxWidth:500,lineHeight:1.7}}>
        Daily + pre-run + post-run + hip-focus blocks. Full mobility section from the original
        plan lives here. Structure preserved; same exercise cards, accent switched to amber.
      </p>
      <div style={{marginTop:24,padding:16,background:'var(--mobBg)',border:'1px solid var(--mobDim)',borderRadius:4,fontSize:13}}>
        → Not redesigned in this pass — locked to original content. Ping me to rework.
      </div>
    </div>
  );
}
function StrengthView() {
  return (
    <div style={{padding:'30px 0',color:'var(--muted)'}}>
      <div style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:300,color:'var(--text)',marginBottom:8}}>
        Lower-Body <em style={{fontStyle:'italic',color:'var(--str)'}}>Strength</em>
      </div>
      <p style={{fontFamily:'var(--mono)',fontSize:11,maxWidth:500,lineHeight:1.7}}>
        Workout A + B + weekly integration blocks.
      </p>
      <div style={{marginTop:24,padding:16,background:'var(--strBg)',border:'1px solid var(--strDim)',borderRadius:4,fontSize:13}}>
        → Not redesigned in this pass — locked to original content. Ping me to rework.
      </div>
    </div>
  );
}

// ============== APP =================
function App() {
  const [mode, setMode] = useLocal('tp-mode', 'run');
  const [completed, setCompleted] = useLocal('tp-completed', {});
  const [detailOpen, setDetailOpen] = React.useState(null);
  const [isWide, setIsWide] = React.useState(typeof window !== 'undefined' && window.innerWidth >= 900);
  React.useEffect(() => {
    const onR = () => setIsWide(window.innerWidth >= 900);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);

  const todayKey = `${TODAY_WEEK_ID}-${TODAY_DAY_INDEX}`;
  const toggleToday = () => setCompleted({...completed, [todayKey]: !completed[todayKey]});

  return (
    <div style={{maxWidth:1200, margin:'0 auto', background:'var(--bg)'}}>
      <ModeBar mode={mode} setMode={setMode}/>

      {/* Hero */}
      <header style={{padding:'22px 18px 16px', borderBottom:'1px solid var(--border)'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:1.8,color:'var(--run)',marginBottom:8}}>
          JAKARTA RUNNER · J. CHOI · APR 2026
        </div>
        <h1 style={{
          fontFamily:'var(--serif)', fontSize:'clamp(32px,6vw,54px)',
          fontWeight:300, letterSpacing:'-0.02em', lineHeight:1.02,
        }}>
          10K → <em style={{fontStyle:'italic',color:'var(--run)'}}>Half Marathon</em>
        </h1>
        <p style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',marginTop:8,letterSpacing:0.5}}>
          28-week build · Sub 48:00 → Sub 1:45 · HR governs pace always
        </p>
      </header>

      {mode === 'mob' && <div style={{padding:'0 18px'}}><MobilityView/></div>}
      {mode === 'str' && <div style={{padding:'0 18px'}}><StrengthView/></div>}

      {mode === 'run' && (
        <div style={{padding:'16px 18px 60px'}}>
          {isWide ? (
            // ———— DESKTOP LAYOUT ————
            <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:24,alignItems:'start'}}>
              <div style={{position:'sticky',top:58,display:'flex',flexDirection:'column',gap:20}}>
                <TodayCard completed={completed} onToggle={toggleToday}/>
                <Countdowns/>
                <div><VolumeChart/></div>
                <div><PhaseTimeline/></div>
              </div>
              <div><WeeklyGrid completed={completed} setCompleted={setCompleted}
                               detailOpen={detailOpen} setDetailOpen={setDetailOpen}/></div>
            </div>
          ) : (
            // ———— MOBILE LAYOUT ————
            <div style={{display:'flex',flexDirection:'column',gap:20}}>
              <TodayCard completed={completed} onToggle={toggleToday}/>
              <Countdowns/>
              <WeeklyGrid completed={completed} setCompleted={setCompleted}
                          detailOpen={detailOpen} setDetailOpen={setDetailOpen}/>
              <div><VolumeChart/></div>
              <div><PhaseTimeline/></div>
            </div>
          )}
        </div>
      )}

      <footer style={{
        padding:'22px 18px',textAlign:'center',
        fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.5,color:'var(--muted2)',
        borderTop:'1px solid var(--border)',
      }}>
        JAKARTA RUNNER · 10K JUL 12 · HM OCT 25
      </footer>
    </div>
  );
}

function mount() {
  if (!window.WEEKS) return setTimeout(mount, 50);
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
mount();
</script>
</body>
</html>
