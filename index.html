<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Jakarta Runner — Training Plan</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0b; --bg2:#0f1211; --surf:#141816; --surf2:#1b201d; --surf3:#252b26;
    --border:#252c26; --border2:#2f3831;
    --text:#eef2ee; --muted:#7a8a7c; --muted2:#4a5a4c; --dim:#3a453c;
    --run:#4eff91; --runBg:#0e1f14; --runDim:#1a4a2e;
    --intv:#f1de58; --intvBg:#211d08; --intvDim:#5b5214;
    --med:#67e8f9; --medBg:#071b1f;
    --mob:#ffa94d; --mobBg:#1e1408; --mobDim:#4a3010;
    --str:#5ab0f5; --strBg:#0a1824; --strDim:#0e2840;
    --rec:#a99bff; --recBg:#0f0e1f;
    --thr:#ffa94d;
    --race:#ff6b6b; --raceBg:#1f0a0a;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Plus Jakarta Sans',system-ui,sans-serif;
    --serif:'Fraunces',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;}
  body{min-height:100vh;line-height:1.5;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  a{color:inherit;text-decoration:none;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="run-data.generated.js"></script>
<script type="text/babel" src="shared-data.jsx"></script>

<script type="text/babel">
const { WEEKS, PHASES, DAY_TYPES, DAY_ABBR, TODAY_WEEK_ID, TODAY_DAY_INDEX,
        DAYS_TO_MAY_10K, DAYS_TO_10K, DAYS_TO_HM, DAYS_TO_OCT_10K, getTodayWeek, getTodayDay } = window;

const TODAY_KEY = `${TODAY_WEEK_ID}-${TODAY_DAY_INDEX}`;
const GLYPH = { rest:'·', easy:'E', rec:'R', intv:'I', thr:'T', med:'M', steady:'M', hm:'H', shake:'R', lng:'L', race:'★' };
const MAX_WEEK_KM = Math.ceil(Math.max(1, ...WEEKS.map(w => w.km)));

const useLocal = (key, init) => {
  const [v, setV] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch (e) { return init; }
  });
  React.useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {} }, [key, v]);
  return [v, setV];
};

function getSessionByKey(key) {
  const [weekId, dayIndexString] = String(key).split('-');
  const week = WEEKS.find(w => w.id === weekId);
  if (!week) return null;
  const dayIndex = Number(dayIndexString);
  const day = week.days[dayIndex];
  if (!day) return null;
  return { key, week, day, dayIndex, meta: DAY_TYPES[day.t] };
}

function decodeHtml(html) {
  if (!html) return '';
  const el = document.createElement('textarea');
  el.innerHTML = html;
  return el.value;
}

function parseDayContent(html) {
  const groups = String(html || '')
    .split('<br><br>')
    .map(group => group.split('<br>').map(line => decodeHtml(line).trim()).filter(Boolean))
    .filter(group => group.length);

  if (!groups.length) return { structured: [], extra: [], note: '' };

  const firstGroup = groups[0];
  const structured = [];
  const extra = [];

  firstGroup.forEach(line => {
    if (line.startsWith('WU:')) structured.push({ label: 'WU', text: line.replace(/^WU:\s*/, '') });
    else if (line.startsWith('Session:')) structured.push({ label: 'MAIN', text: line.replace(/^Session:\s*/, '') });
    else if (line.startsWith('CD:')) structured.push({ label: 'CD', text: line.replace(/^CD:\s*/, '') });
    else extra.push(line);
  });

  const remaining = groups.slice(1);
  const noteGroup = remaining.length ? remaining[remaining.length - 1] : [];
  const extraGroups = remaining.length > 1 ? remaining.slice(0, -1) : [];
  extraGroups.flat().forEach(line => extra.push(line));

  return {
    structured,
    extra,
    note: noteGroup.join(' '),
  };
}

function cardButtonStyle(color, ghost) {
  return {
    padding:'9px 12px',
    borderRadius:3,
    background: ghost ? 'transparent' : color,
    border: ghost ? `1px solid ${color}` : '1px solid transparent',
    color: ghost ? color : 'var(--bg)',
    fontFamily:'var(--mono)',
    fontSize:10,
    letterSpacing:1.3,
    fontWeight:600,
  };
}

function pad2(n) {
  return String(n).padStart(2, '0');
}

function localDateInputValue(date = new Date()) {
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: PLAN_TIME_ZONE,
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
  }).formatToParts(date);
  const map = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return `${map.year}-${map.month}-${map.day}`;
}

function dateUtc(dateString) {
  const [year, month, day] = String(dateString || '').split('-').map(Number);
  if (!year || !month || !day) return null;
  return Date.UTC(year, month - 1, day);
}

function formatShortDate(dateString) {
  const utc = dateUtc(dateString);
  if (utc === null) return dateString;
  return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' }).format(new Date(utc));
}

function getWeekStart(dateString) {
  const utc = dateUtc(dateString);
  if (utc === null) return null;
  const day = new Date(utc).getUTCDay();
  const mondayOffset = (day + 6) % 7;
  const start = new Date(utc - mondayOffset * 86400000);
  return `${start.getUTCFullYear()}-${pad2(start.getUTCMonth() + 1)}-${pad2(start.getUTCDate())}`;
}

function getWeekLabel(weekStart) {
  const startUtc = dateUtc(weekStart);
  if (startUtc === null) return weekStart;
  const end = new Date(startUtc + 6 * 86400000);
  return `${formatShortDate(weekStart)}-${formatShortDate(`${end.getUTCFullYear()}-${pad2(end.getUTCMonth() + 1)}-${pad2(end.getUTCDate())}`)}`;
}

function numberOrNull(value) {
  const n = Number(value);
  return Number.isFinite(n) && n > 0 ? n : null;
}

function mean(values) {
  const nums = values.filter(v => Number.isFinite(v));
  return nums.length ? nums.reduce((sum, v) => sum + v, 0) / nums.length : null;
}

function fmt(value, digits = 1) {
  return Number.isFinite(value) ? value.toFixed(digits) : '—';
}

function summarizeHealth(entries) {
  const byWeek = new Map();
  entries.forEach(entry => {
    const weekStart = getWeekStart(entry.date);
    if (!weekStart) return;
    if (!byWeek.has(weekStart)) byWeek.set(weekStart, []);
    byWeek.get(weekStart).push(entry);
  });

  const weeks = Array.from(byWeek.entries())
    .map(([weekStart, records]) => {
      const sorted = records.slice().sort((a, b) => a.date.localeCompare(b.date));
      return {
        weekStart,
        label: getWeekLabel(weekStart),
        records: sorted,
        count: sorted.length,
        avgWeight: mean(sorted.map(r => r.weight)),
        avgSys: mean(sorted.map(r => r.systolic)),
        avgDia: mean(sorted.map(r => r.diastolic)),
      };
    })
    .sort((a, b) => a.weekStart.localeCompare(b.weekStart));

  return weeks.map((week, index) => {
    const prev = weeks[index - 1];
    const delta = prev && Number.isFinite(week.avgWeight) && Number.isFinite(prev.avgWeight)
      ? week.avgWeight - prev.avgWeight
      : null;
    return { ...week, delta };
  });
}

function TextField({ label, value, onChange, type = 'text', placeholder, min, max, inputRef }) {
  return (
    <label style={{display:'grid',gap:6}}>
      <span style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.3,color:'var(--muted2)'}}>{label}</span>
      <input
        ref={inputRef}
        type={type}
        value={value}
        min={min}
        max={max}
        placeholder={placeholder}
        onChange={e => onChange(e.target.value)}
        onInput={e => onChange(e.currentTarget.value)}
        style={{
          width:'100%',
          minHeight:38,
          background:'var(--bg)',
          border:'1px solid var(--border2)',
          borderRadius:3,
          color:'var(--text)',
          padding:'9px 10px',
          fontFamily:'var(--mono)',
          fontSize:12,
          outline:'none',
        }}
      />
    </label>
  );
}

function HealthMetric({ label, value, meta, color = 'var(--run)' }) {
  return (
    <div style={{
      background:'var(--surf)',
      border:'1px solid var(--border)',
      borderRadius:4,
      padding:'12px',
      minHeight:82,
    }}>
      <div style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.5,color:'var(--muted2)',marginBottom:8}}>{label}</div>
      <div style={{fontFamily:'var(--serif)',fontSize:29,fontWeight:300,lineHeight:1,color}}>{value}</div>
      <div style={{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--muted)',marginTop:8,lineHeight:1.45}}>{meta}</div>
    </div>
  );
}

function weightStatusForDelta(delta) {
  if (!Number.isFinite(delta)) return 'BASELINE';
  if (delta <= -0.75 && delta >= -1.25) return 'TARGET';
  if (delta < -1.25) return 'FAST';
  if (delta < 0) return 'SLOW';
  return 'UP';
}

function colorForWeightDelta(delta) {
  if (!Number.isFinite(delta)) return 'var(--muted)';
  return delta < 0 ? 'var(--med)' : 'var(--mob)';
}

function HealthView({ isWide }) {
  const [entries, setEntries] = useLocal('tp-health-entries', []);
  const today = localDateInputValue();
  const [date, setDate] = React.useState(today);
  const existing = entries.find(entry => entry.date === date);
  const [weight, setWeight] = React.useState(existing?.weight ? String(existing.weight) : '');
  const [systolic, setSystolic] = React.useState(existing?.systolic ? String(existing.systolic) : '');
  const [diastolic, setDiastolic] = React.useState(existing?.diastolic ? String(existing.diastolic) : '');
  const dateInputRef = React.useRef(null);
  const weightInputRef = React.useRef(null);
  const systolicInputRef = React.useRef(null);
  const diastolicInputRef = React.useRef(null);
  const sortedEntries = entries.slice().sort((a, b) => b.date.localeCompare(a.date));
  const weekly = summarizeHealth(entries);
  const latestWeek = weekly[weekly.length - 1];
  const latestEntry = sortedEntries[0];
  const healthAccent = 'var(--med)';

  React.useEffect(() => {
    const next = entries.find(entry => entry.date === date);
    setWeight(next?.weight ? String(next.weight) : '');
    setSystolic(next?.systolic ? String(next.systolic) : '');
    setDiastolic(next?.diastolic ? String(next.diastolic) : '');
  }, [date, entries]);

  const saveEntry = () => {
    const rawDate = dateInputRef.current?.value || date;
    const nextEntry = {
      date: rawDate,
      weight: numberOrNull(weightInputRef.current?.value ?? weight),
      systolic: numberOrNull(systolicInputRef.current?.value ?? systolic),
      diastolic: numberOrNull(diastolicInputRef.current?.value ?? diastolic),
    };
    if (!nextEntry.date || (!nextEntry.weight && !nextEntry.systolic && !nextEntry.diastolic)) return;
    setDate(nextEntry.date);
    setEntries(currentEntries => [
      ...currentEntries.filter(entry => entry.date !== nextEntry.date),
      nextEntry,
    ].sort((a, b) => a.date.localeCompare(b.date)));
  };

  const deleteEntry = entryDate => {
    setEntries(currentEntries => currentEntries.filter(entry => entry.date !== entryDate));
  };

  const weeklyDelta = latestWeek?.delta;
  const weightTrend = weeklyDelta === null || weeklyDelta === undefined
    ? 'NEEDS PRIOR WEEK'
    : weeklyDelta <= -1.25
      ? 'AHEAD OF TARGET'
      : weeklyDelta <= -0.75
        ? 'ON TARGET'
        : weeklyDelta < 0
          ? 'LOSING SLOWER'
          : 'NOT LOSING';
  const trendColor = weeklyDelta === null || weeklyDelta === undefined
    ? 'var(--muted)'
    : weeklyDelta < 0
      ? healthAccent
      : 'var(--mob)';

  return (
    <div style={{padding:'12px 0 42px'}}>
      <div style={{paddingTop:14}}>
        <div style={{fontFamily:'var(--serif)',fontSize:30,fontWeight:300,color:'var(--text)',marginBottom:6}}>
          Bodyweight <em style={{fontStyle:'italic',color:healthAccent}}>Monitor</em>
        </div>
      </div>

      <div style={{
        display:'grid',
        gridTemplateColumns:'repeat(auto-fit, minmax(170px, 1fr))',
        gap:8,
        marginTop:18,
      }}>
        <HealthMetric
          label="CURRENT WEEK AVG"
          value={latestWeek?.avgWeight ? `${fmt(latestWeek.avgWeight)} lb` : '—'}
          meta={latestWeek ? `${latestWeek.label} · ${latestWeek.count}/7 logs` : 'No weight logs yet'}
          color={healthAccent}
        />
        <HealthMetric
          label="WEEKLY CHANGE"
          value={Number.isFinite(weeklyDelta) ? `${weeklyDelta > 0 ? '+' : ''}${fmt(weeklyDelta)} lb` : '—'}
          meta={`${weightTrend} · goal -1.0 lb/wk`}
          color={trendColor}
        />
        <HealthMetric
          label="BP WEEK AVG"
          value={latestWeek?.avgSys && latestWeek?.avgDia ? `${Math.round(latestWeek.avgSys)}/${Math.round(latestWeek.avgDia)}` : '—'}
          meta={latestWeek ? `${latestWeek.label} · systolic/diastolic` : 'No BP logs yet'}
          color={healthAccent}
        />
        <HealthMetric
          label="LATEST ENTRY"
          value={latestEntry ? formatShortDate(latestEntry.date) : '—'}
          meta={latestEntry ? `${latestEntry.weight ? `${fmt(latestEntry.weight)} lb` : 'no weight'} · ${latestEntry.systolic && latestEntry.diastolic ? `${latestEntry.systolic}/${latestEntry.diastolic}` : 'no BP'}` : 'Start with today'}
          color="var(--text)"
        />
      </div>

      <div style={{
        display:'grid',
        gridTemplateColumns:isWide ? 'minmax(0, 360px) minmax(0, 1fr)' : '1fr',
        gap:18,
        marginTop:22,
        alignItems:'start',
      }}>
        <div style={{
          background:'var(--surf)',
          border:'1px solid var(--border)',
          borderRadius:6,
          padding:'16px',
        }}>
          <SectionHead label={existing ? 'UPDATE DAILY ENTRY' : 'NEW DAILY ENTRY'} meta="weight + blood pressure"/>
          <div style={{display:'grid',gap:12}}>
            <TextField label="DATE" type="date" value={date} onChange={setDate} inputRef={dateInputRef}/>
            <TextField label="WEIGHT · LB" type="number" min="0" value={weight} onChange={setWeight} placeholder="185.0" inputRef={weightInputRef}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <TextField label="SYSTOLIC" type="number" min="0" max="300" value={systolic} onChange={setSystolic} placeholder="120" inputRef={systolicInputRef}/>
              <TextField label="DIASTOLIC" type="number" min="0" max="200" value={diastolic} onChange={setDiastolic} placeholder="80" inputRef={diastolicInputRef}/>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',paddingTop:2}}>
              <button onClick={saveEntry} style={cardButtonStyle(healthAccent, false)}>
                SAVE ENTRY
              </button>
              {existing ? (
                <button onClick={() => deleteEntry(date)} style={cardButtonStyle('var(--race)', true)}>
                  DELETE
                </button>
              ) : null}
            </div>
          </div>
        </div>

        <div style={{display:'grid',gap:22}}>
          <div>
            <SectionHead label="WEEKLY TREND" meta="Monday-start weeks · daily entries averaged"/>
            {isWide ? (
              <div>
              <div style={{
                display:'grid',
                gridTemplateColumns:'minmax(92px,1.1fr) minmax(54px,.6fr) repeat(3, minmax(70px,.8fr)) minmax(86px,1fr)',
                gap:3,
                fontFamily:'var(--mono)',
                fontSize:9,
                color:'var(--muted2)',
                letterSpacing:1,
                marginBottom:4,
                alignItems:'center',
              }}>
                <div>WEEK</div><div style={{textAlign:'right'}}>LOGS</div><div style={{textAlign:'right'}}>AVG LB</div><div style={{textAlign:'right'}}>DELTA</div><div style={{textAlign:'right'}}>BP AVG</div><div style={{textAlign:'right'}}>STATUS</div>
              </div>
              <div style={{display:'grid',gap:3}}>
                {weekly.slice().reverse().map(week => {
                  const delta = week.delta;
                  const status = weightStatusForDelta(delta);
                  const color = colorForWeightDelta(delta);
                  return (
                    <div key={week.weekStart} style={{
                      display:'grid',
                      gridTemplateColumns:'minmax(92px,1.1fr) minmax(54px,.6fr) repeat(3, minmax(70px,.8fr)) minmax(86px,1fr)',
                      gap:3,
                      alignItems:'center',
                      background:'var(--surf)',
                      border:'1px solid var(--border)',
                      borderRadius:3,
                      padding:'8px 9px',
                      fontFamily:'var(--mono)',
                      fontSize:10,
                    }}>
                      <div style={{color:'var(--text)'}}>{week.label}</div>
                      <div style={{color:'var(--muted)',textAlign:'right'}}>{week.count}/7</div>
                      <div style={{color:healthAccent,textAlign:'right'}}>{week.avgWeight ? fmt(week.avgWeight) : '—'}</div>
                      <div style={{color,textAlign:'right'}}>{Number.isFinite(delta) ? `${delta > 0 ? '+' : ''}${fmt(delta)}` : '—'}</div>
                      <div style={{color:healthAccent,textAlign:'right'}}>{week.avgSys && week.avgDia ? `${Math.round(week.avgSys)}/${Math.round(week.avgDia)}` : '—'}</div>
                      <div style={{color,textAlign:'right',letterSpacing:1.1}}>{status}</div>
                    </div>
                  );
                })}
                {!weekly.length ? (
                  <div style={{
                    background:'var(--surf)',
                    border:'1px solid var(--border)',
                    borderRadius:4,
                    padding:'16px',
                    color:'var(--muted)',
                    fontSize:13,
                  }}>No entries yet.</div>
                ) : null}
              </div>
              </div>
            ) : (
              <div style={{display:'grid',gap:8}}>
                {weekly.slice().reverse().map(week => {
                  const delta = week.delta;
                  const status = weightStatusForDelta(delta);
                  const color = colorForWeightDelta(delta);
                  return (
                    <div key={week.weekStart} style={{
                      background:'var(--surf)',
                      border:'1px solid var(--border)',
                      borderRadius:4,
                      padding:'11px 12px',
                      fontFamily:'var(--mono)',
                    }}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'baseline',marginBottom:10}}>
                        <div style={{fontSize:11,color:'var(--text)'}}>{week.label}</div>
                        <div style={{fontSize:10,color,fontWeight:600,letterSpacing:1}}>{status}</div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(2, minmax(0, 1fr))',gap:8}}>
                        <div>
                          <div style={{fontSize:8.5,letterSpacing:1.2,color:'var(--muted2)',marginBottom:3}}>AVG LB</div>
                          <div style={{fontSize:14,color:healthAccent}}>{week.avgWeight ? fmt(week.avgWeight) : '—'}</div>
                        </div>
                        <div>
                          <div style={{fontSize:8.5,letterSpacing:1.2,color:'var(--muted2)',marginBottom:3}}>DELTA</div>
                          <div style={{fontSize:14,color}}>{Number.isFinite(delta) ? `${delta > 0 ? '+' : ''}${fmt(delta)}` : '—'}</div>
                        </div>
                        <div>
                          <div style={{fontSize:8.5,letterSpacing:1.2,color:'var(--muted2)',marginBottom:3}}>BP AVG</div>
                          <div style={{fontSize:14,color:healthAccent}}>{week.avgSys && week.avgDia ? `${Math.round(week.avgSys)}/${Math.round(week.avgDia)}` : '—'}</div>
                        </div>
                        <div>
                          <div style={{fontSize:8.5,letterSpacing:1.2,color:'var(--muted2)',marginBottom:3}}>LOGS</div>
                          <div style={{fontSize:14,color:'var(--muted)'}}>{week.count}/7</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
                {!weekly.length ? (
                  <div style={{
                    background:'var(--surf)',
                    border:'1px solid var(--border)',
                    borderRadius:4,
                    padding:'16px',
                    color:'var(--muted)',
                    fontSize:13,
                  }}>No entries yet.</div>
                ) : null}
              </div>
            )}
          </div>

          <div>
            <SectionHead label="RECENT LOG" meta="newest first"/>
            <div style={{display:'grid',gap:3}}>
              {sortedEntries.slice(0, 14).map(entry => (
                <div key={entry.date} style={{
                  display:'grid',
                  gridTemplateColumns:isWide ? 'minmax(86px,1fr) minmax(74px,.8fr) minmax(74px,.8fr) auto' : '1fr auto',
                  gap:isWide ? 8 : 10,
                  alignItems:isWide ? 'center' : 'start',
                  background:'var(--surf)',
                  border:'1px solid var(--border)',
                  borderRadius:3,
                  padding:isWide ? '8px 9px' : '10px 12px',
                  fontFamily:'var(--mono)',
                  fontSize:10,
                }}>
                  <div>
                    <button onClick={() => setDate(entry.date)} style={{textAlign:'left',color:'var(--text)',fontFamily:'var(--mono)',fontSize:10}}>
                      {formatShortDate(entry.date)}
                    </button>
                    {!isWide ? (
                      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:7,fontSize:12}}>
                        <span style={{color:healthAccent}}>{entry.weight ? `${fmt(entry.weight)} lb` : '—'}</span>
                        <span style={{color:healthAccent}}>{entry.systolic && entry.diastolic ? `${entry.systolic}/${entry.diastolic}` : '—'}</span>
                      </div>
                    ) : null}
                  </div>
                  {isWide ? <div style={{color:healthAccent,textAlign:'right'}}>{entry.weight ? `${fmt(entry.weight)} lb` : '—'}</div> : null}
                  {isWide ? <div style={{color:healthAccent,textAlign:'right'}}>{entry.systolic && entry.diastolic ? `${entry.systolic}/${entry.diastolic}` : '—'}</div> : null}
                  <button onClick={() => deleteEntry(entry.date)} title="Delete entry" style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--muted2)',padding:'2px 4px'}}>×</button>
                </div>
              ))}
              {!sortedEntries.length ? (
                <div style={{

  );
}

  const title = session.day.t === 'rest' ? 'Rest Day' : session.day.s;

    <div style={{
      background: session.meta.bg,

      {tags.length || session.day.pace ? (
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>

function PhaseTimeline() {
  const todayIdx = WEEKS.findIndex(w => w.id === TODAY_WEEK_ID);
  return (
    <div>
      <SectionHead label="PHASE TIMELINE" meta="25 weeks · May → Oct"/>
      <div>
        {PHASES.map((phase, pi) => {
          const phaseWeeks = WEEKS.filter(w => w.phase === phase.id);
          if (!phaseWeeks.length) return null;
          const isActive = phaseWeeks.some(w => w.id === TODAY_WEEK_ID);
          const isPast = phaseWeeks.every(w => WEEKS.indexOf(w) < todayIdx);
          const totalKm = phaseWeeks.reduce((s, w) => s + w.km, 0);
          const doneKm = phaseWeeks.reduce((s, w) => s + (WEEKS.indexOf(w) < todayIdx ? w.km : 0), 0);
          const pct = totalKm ? (doneKm / totalKm) * 100 : 0;
          return (
            <div key={phase.id} style={{
              display:'grid',
              gridTemplateColumns:'18px 1fr',
              gap:10,
              padding:'10px 0',
              borderTop: pi > 0 ? '1px solid var(--border)' : 'none',
              opacity: isPast ? 0.45 : 1,
            }}>
              <div style={{position:'relative'}}>
                <div style={{
                  position:'absolute',
                  left:6,
                  top:5,
                  width:8,
                  height:8,
                  borderRadius:'50%',
                  background: isActive ? 'var(--run)' : isPast ? 'var(--muted2)' : 'var(--bg)',
                  border:`2px solid ${isActive ? 'var(--run)' : isPast ? 'var(--muted2)' : 'var(--dim)'}`,
                }}/>
                {pi < PHASES.length - 1 ? <div style={{
                  position:'absolute',
                  left:9,
                  top:18,
                  bottom:-10,
                  width:1,
                  background:'var(--border2)',
                }}/> : null}
              </div>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
                  <div>
                    <span style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.5,color:isActive ? 'var(--run)' : 'var(--muted2)'}}>
                      {isActive ? 'NOW' : isPast ? 'DONE' : 'UPCOMING'}
                    </span>
                    <span style={{fontSize:13,fontWeight:500,color:'var(--text)',marginLeft:10}}>{phase.name}</span>
                  </div>
                  <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)'}}>Wk {phase.startWk}–{phase.endWk} · {totalKm}km</span>
                </div>
                {(isActive || isPast) ? (
                  <div style={{height:2,background:'var(--surf2)',borderRadius:1,marginTop:6,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:isActive ? 'var(--run)' : 'var(--muted2)'}}/>
                  </div>
                ) : null}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function VolumeChart() {
  const todayIdx = WEEKS.findIndex(w => w.id === TODAY_WEEK_ID);
  const maxKm = MAX_WEEK_KM;
  const height = 120;
  const [activeWeekId, setActiveWeekId] = React.useState(TODAY_WEEK_ID);
  const activeWeek = WEEKS.find(w => w.id === activeWeekId) || getTodayWeek();
  return (
    <div>
      <SectionHead
        label="WEEKLY VOLUME"
        meta={`Wk ${activeWeek.id} · ${activeWeek.kmLabel || `${activeWeek.km}km`} · ${activeWeek.dates}`}
      />
      <div style={{display:'flex',alignItems:'flex-end',gap:2,height,marginBottom:6}}>
        {WEEKS.map((w, index) => {
          const isToday = w.id === TODAY_WEEK_ID;
          const past = index < todayIdx;
          const isActive = w.id === activeWeekId;
          const barHeight = Math.max(2, (w.km / maxKm) * height);
          let color = 'var(--muted)';
          if (w.race) color = 'var(--race)';
          else if (isToday) color = 'var(--run)';
          else if (past) color = 'var(--dim)';
          return (
            <button
              key={w.id}
              type="button"
              title={`Wk ${w.id}: ${w.kmLabel || `${w.km}km`}`}
              onMouseEnter={() => setActiveWeekId(w.id)}
              onFocus={() => setActiveWeekId(w.id)}
              onTouchStart={() => setActiveWeekId(w.id)}
              style={{
              flex:1,
              height:barHeight,
              background:color,
              borderRadius:'1px 1px 0 0',
              opacity:1,
              position:'relative',
              minWidth:0,
              padding:0,
              alignSelf:'flex-end',
              outline:isActive ? `1px solid ${w.race ? 'var(--race)' : isToday ? 'var(--run)' : 'var(--text)'}` : 'none',
              outlineOffset:1,
            }}>
              {w.race ? <div style={{
                position:'absolute',
                top:-14,
                left:'50%',
                transform:'translateX(-50%)',
                fontSize:9,
                color:'var(--race)',
              }}>★</div> : null}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function WeeklyGrid({ completed, selectedKey, setSelectedKey, isWide }) {
  const todayIdx = WEEKS.findIndex(w => w.id === TODAY_WEEK_ID);
  const maxKm = MAX_WEEK_KM;
  const columns = isWide
    ? 'minmax(36px,auto) minmax(74px,auto) minmax(74px,auto) minmax(32px,auto) repeat(7, minmax(28px,1fr)) minmax(42px,auto)'
    : 'minmax(30px,auto) minmax(64px,auto) minmax(28px,auto) repeat(7, minmax(22px,1fr))';
  return (
    <div>
      <SectionHead label="FULL GRID · 25 WEEKS × 7 DAYS" meta="tap a day to load the detail card"/>
      <div style={{
        display:'grid',
        gridTemplateColumns:columns,
        gap:3,
        alignItems:'center',
        fontFamily:'var(--mono)',
        fontSize:9,
        color:'var(--muted2)',
        letterSpacing:1,
        marginBottom:4,
      }}>
        <div>WK</div><div>DATES</div>{isWide ? <div>TPL</div> : null}<div style={{textAlign:'right'}}>KM</div>
        {DAY_ABBR.map(d => <div key={d} style={{textAlign:'center'}}>{d}</div>)}
        {isWide ? <div style={{textAlign:'right'}}>VOL</div> : null}
      </div>

      {PHASES.map(phase => {
        const phaseWeeks = WEEKS.filter(w => w.phase === phase.id);
        if (!phaseWeeks.length) return null;
        return (
          <React.Fragment key={phase.id}>
            <div style={{
              fontFamily:'var(--mono)',
              fontSize:9,
              letterSpacing:1.5,
              color:'var(--muted)',
              padding:'8px 0 5px',
              borderBottom:'1px solid var(--border)',
              marginBottom:4,
              marginTop:4,
              textTransform:'uppercase',
            }}>{phase.name}</div>
            {phaseWeeks.map(week => {
              const weekIndex = WEEKS.indexOf(week);
              const isTodayWeek = week.id === TODAY_WEEK_ID;
              const isPast = weekIndex < todayIdx;
              return (
                <div key={week.id} style={{
                  display:'grid',
                  gridTemplateColumns:columns,
                  gap:3,
                  alignItems:'center',
                  padding:'2px 0',
                  opacity:isPast ? 0.4 : 1,
                }}>
                  <div style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:isTodayWeek ? 'var(--run)' : 'var(--text)'}}>
                    {week.id}{week.cutback ? <span style={{color:'var(--muted)',fontWeight:400}}>↓</span> : null}
                  </div>
                  <div style={{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--muted2)'}}>{week.dates}</div>
                  {isWide ? (
                    <div title={week.template || ''} style={{
                      fontFamily:'var(--mono)',
                      fontSize:8.5,
                      color:'var(--muted)',
                      whiteSpace:'nowrap',
                      overflow:'hidden',
                      textOverflow:'ellipsis',
                    }}>{week.template || ''}</div>
                  ) : null}
                  <div title={week.kmLabel || `${week.km}km`} style={{fontFamily:'var(--mono)',fontSize:10,color:isTodayWeek ? 'var(--run)' : 'var(--muted)',textAlign:'right'}}>
                    {week.kmLabel ? week.kmLabel.replace(/^~/, '').replace(/km$/, '') : week.km}
                  </div>

                  {week.days.map((day, dayIndex) => {
                    const meta = DAY_TYPES[day.t];
                    const key = `${week.id}-${dayIndex}`;
                    const isSelected = key === selectedKey;
                    const isDone = !!completed[key];
                    return (
                      <button key={key} onClick={() => setSelectedKey(key)} title={`${DAY_ABBR[dayIndex]}: ${day.s}`} style={{
                        height:20,
                        padding:0,
                        background:day.t === 'rest' ? 'var(--surf)' : meta.color,
                        opacity:day.t === 'rest' ? 1 : (isDone ? 0.35 : 0.88),
                        border:isSelected ? '2px solid var(--text)' : '1px solid var(--border2)',
                        borderRadius:2,
                        fontFamily:'var(--mono)',
                        fontSize:8.5,
                        fontWeight:600,
                        color:day.t === 'rest' ? 'var(--muted2)' : 'var(--bg)',
                        lineHeight:1,
                      }}>
                        {isDone ? '✓' : GLYPH[day.t]}
                      </button>
                    );
                  })}

                  {isWide ? (
                    <div style={{height:10,background:'var(--surf)',borderRadius:1,position:'relative',overflow:'hidden'}}>
                      <div style={{
                        position:'absolute',
                        left:0,
                        top:0,
                        bottom:0,
                        width:`${(week.km / maxKm) * 100}%`,
                        background:week.race ? 'var(--race)' : isTodayWeek ? 'var(--run)' : 'var(--muted)',
                        opacity:isPast ? 0.55 : 1,
                      }}/>
                    </div>
                  ) : null}
                </div>
              );
            })}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function ExerciseCard({ item, accent, openByDefault }) {
  const [open, setOpen] = React.useState(!!openByDefault);
  return (
    <div style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:4,overflow:'hidden'}}>
      <button onClick={() => setOpen(!open)} style={{
        width:'100%',
        display:'grid',
        gridTemplateColumns:'1fr auto',
        gap:10,
        alignItems:'center',
        padding:'12px 14px',
        textAlign:'left',
      }}>
        <div>
          <div style={{fontSize:14,fontWeight:500,color:'var(--text)'}}>{item.name}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:accent,letterSpacing:1.2,marginTop:4}}>{item.dose}</div>
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:14,color:'var(--muted)'}}>{open ? '−' : '+'}</div>
      </button>
      {open ? (
        <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)',fontSize:13,color:'var(--muted)',lineHeight:1.65}}>
          <div style={{paddingTop:12}}>{item.detail}</div>
          <div style={{marginTop:10,fontFamily:'var(--mono)',fontSize:10,color:accent,letterSpacing:1.1}}>
            ↗ {item.focus}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function ContentSection({ label, meta, intro, accent, items, note, showIntro = true }) {
  return (
    <div style={{paddingTop:26}}>
      <SectionHead label={label} meta={meta}/>
      {showIntro ? <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.7,maxWidth:760,marginBottom:14}}>{intro}</p> : null}
      {note ? (
        <div style={{
          marginBottom:14,
          padding:'11px 14px',
          background:'var(--surf)',
          borderLeft:`3px solid ${accent}`,
          borderRadius:'0 4px 4px 0',
          fontSize:13,
          color:'var(--text)',
          lineHeight:1.65,
        }}>{note}</div>
      ) : null}
      <div style={{display:'grid',gap:8}}>
        {items.map((item, index) => <ExerciseCard key={item.name} item={item} accent={accent} openByDefault={index === 0}/>)}
      </div>
    </div>
  );
}

function TimingSection({ label, meta, intro, accent, rows, footnote, showIntro = true }) {
  return (
    <div style={{paddingTop:26}}>
      <SectionHead label={label} meta={meta}/>
      {showIntro ? <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.7,maxWidth:760,marginBottom:14}}>{intro}</p> : null}
      <div style={{
        background:'var(--surf)',
        border:'1px solid var(--border)',
        borderRadius:6,
        padding:'16px',
        display:'grid',
        gap:14,
      }}>
        {rows.map(([day, detail]) => (
          <div key={day} style={{borderLeft:`2px solid ${accent}`,paddingLeft:12}}>
            <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:1.2,color:accent,marginBottom:4}}>{day}</div>
            <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.55}}>{detail}</div>
          </div>
        ))}
      </div>
      {footnote ? (
        <div style={{
          marginTop:14,
          padding:'11px 14px',
          background:'var(--surf)',
          borderLeft:`3px solid ${accent}`,
          borderRadius:'0 4px 4px 0',
          fontSize:13,
          color:'var(--text)',
          lineHeight:1.65,
        }}>{footnote}</div>
      ) : null}
    </div>
  );
}

function MobilityView() {
  return (
    <div style={{padding:'12px 0 42px'}}>
      <div style={{paddingTop:14}}>
        <div style={{fontFamily:'var(--serif)',fontSize:30,fontWeight:300,color:'var(--text)',marginBottom:6}}>
          Full Mobility <em style={{fontStyle:'italic',color:'var(--mob)'}}>Regimen</em>
        </div>
      </div>
      {MOBILITY_SECTIONS.map(section => <ContentSection key={section.label} {...section} meta={null} showIntro={false}/>)}
      <TimingSection
        label="WEEKLY INTEGRATION"
        meta={null}
        intro="Make the pre- and post-run work automatic on run days, then add the standalone and hip-focus work where the week has room for it."
        accent="var(--mob)"
        rows={MOBILITY_TIMING}
        footnote="Progression: build consistency first. After a few steady weeks, add longer holds or a light contract-relax emphasis to the tightest positions."
        showIntro={false}
      />
    </div>
  );
}

function StrengthView() {
  return (
    <div style={{padding:'12px 0 42px'}}>
      <div style={{paddingTop:14}}>
        <div style={{fontFamily:'var(--serif)',fontSize:30,fontWeight:300,color:'var(--text)',marginBottom:6}}>
          Lower-Body <em style={{fontStyle:'italic',color:'var(--str)'}}>Strength</em>
        </div>
      </div>

      <ContentSection
        label="WORKOUT A — LOWER COMPOUND"
        meta="Monday · after intervals"
        intro="Heavy bilateral work while the nervous system is already switched on from the quality run. Keep the focus on clean force production, not junk volume."
        accent="var(--str)"
        items={STRENGTH_A}
      />

      <ContentSection
        label="WORKOUT B — SINGLE-LEG & CONTROL"
        meta="Friday · after easy run"
        intro="Moderate loads and better control. This is where hip stability, glute med support, and unilateral mechanics get the emphasis."
        accent="var(--str)"
        items={STRENGTH_B}
      />

      <TimingSection
        label="WEEKLY INTEGRATION"
        meta="fitting strength into the run week"
        intro="Strength comes after running on the same day, never before it. That keeps the quality sessions clean and clusters hard work together."
        accent="var(--str)"
        rows={STRENGTH_TIMING}
        footnote="Taper note: in the final two weeks before a goal race, reduce volume aggressively. In race week, strength should be gone by midweek."
      />
    </div>
  );
}

function App() {
  const [mode, setMode] = useLocal('tp-mode', 'run');
  const [completed, setCompleted] = useLocal('tp-completed', {});
  const [selectedKey, setSelectedKey] = React.useState(TODAY_KEY);
  const [isWide, setIsWide] = React.useState(typeof window !== 'undefined' && window.innerWidth >= 900);
  const cardRef = React.useRef(null);
  const modeAccent = mode === 'mob' ? 'var(--mob)' : mode === 'str' ? 'var(--str)' : mode === 'health' ? 'var(--med)' : 'var(--run)';
  const headerTitle = mode === 'health'
    ? <>Weight + <em style={{fontStyle:'italic',color:modeAccent}}>Blood Pressure</em></>
    : <>HM Build → <em style={{fontStyle:'italic',color:modeAccent}}>10K Sharpening</em></>;
  const headerMeta = mode === 'health'
    ? 'JAKARTA RUNNER · J. CHOI · HEALTH LOG'
    : 'JAKARTA RUNNER · J. CHOI · MAY 2026';

  React.useEffect(() => {
    setSelectedKey(TODAY_KEY);
  }, []);

  React.useEffect(() => {
    const onResize = () => setIsWide(window.innerWidth >= 900);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  return (
    <div style={{maxWidth:1200,margin:'0 auto',background:'var(--bg)'}}>
      <ModeBar mode={mode} setMode={setMode}/>

      <header style={{padding:'22px 18px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:1.8,color:modeAccent,marginBottom:8}}>
          {headerMeta}
        </div>
        <h1 style={{
          fontFamily:'var(--serif)',
          fontSize:'clamp(32px,6vw,54px)',
          fontWeight:300,
          letterSpacing:'-0.02em',
          lineHeight:1.02,
        }}>
          {headerTitle}
        </h1>
      </header>

      {mode === 'mob' ? <div style={{padding:'0 18px'}}><MobilityView/></div> : null}
      {mode === 'str' ? <div style={{padding:'0 18px'}}><StrengthView/></div> : null}
      {mode === 'health' ? <div style={{padding:'0 18px'}}><HealthView isWide={isWide}/></div> : null}

      {mode === 'run' ? (
        <div style={{padding:'16px 18px 60px'}}>
          {isWide ? (
            <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:24,alignItems:'start'}}>
              <div style={{
                position:'sticky',
                top:58,
                alignSelf:'start',
                display:'flex',
                flexDirection:'column',
                gap:20,
                maxHeight:'calc(100vh - 70px)',
                overflowY:'auto',
                paddingRight:4,
              }}>
                <DayDetailCard selectedKey={selectedKey} completed={completed} setCompleted={setCompleted} onGoToToday={() => setSelectedKey(TODAY_KEY)} cardRef={cardRef}/>
                <Countdowns compact/>
                <VolumeChart/>
                <PhaseTimeline/>
              </div>
              <WeeklyGrid completed={completed} selectedKey={selectedKey} setSelectedKey={setSelectedKey} isWide={isWide}/>
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:20}}>
              <div style={{
                position:'sticky',
                top:43,
                zIndex:15,
                background:'var(--bg)',
                paddingBottom:10,
              }}>
                <DayDetailCard selectedKey={selectedKey} completed={completed} setCompleted={setCompleted} onGoToToday={() => setSelectedKey(TODAY_KEY)} cardRef={cardRef}/>
              </div>
              <Countdowns/>
              <WeeklyGrid completed={completed} selectedKey={selectedKey} setSelectedKey={setSelectedKey} isWide={isWide}/>
              <VolumeChart/>
              <PhaseTimeline/>
            </div>
          )}
        </div>
      ) : null}

      <footer style={{
        padding:'22px 18px',
        textAlign:'center',
        fontFamily:'var(--mono)',
        fontSize:9,
        letterSpacing:1.5,
        color:'var(--muted2)',
        borderTop:'1px solid var(--border)',
      }}>
        JAKARTA RUNNER · MAY 24 10K MINI-TAPER · JUL 12 10K BENCHMARK · AUG 23 HM A-RACE · OCT 25 10K A-RACE
      </footer>
    </div>
  );
}

function mount() {
  if (!window.WEEKS) return setTimeout(mount, 50);
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}

mount();
</script>
</body>
</html>
