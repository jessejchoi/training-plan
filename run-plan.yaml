  pace_guide_html: "<strong>Easy/recovery:</strong> effort-first, usually ~6:15&ndash;7:10/km in Jakarta conditions &nbsp;&middot;&nbsp; <strong>Steady:</strong> ~5:35&ndash;5:55/km early, progressing toward ~5:20&ndash;5:45/km &nbsp;&middot;&nbsp; <strong>Threshold:</strong> mostly ~5:05&ndash;5:15/km, progressing toward ~5:00&ndash;5:10/km &nbsp;&middot;&nbsp; <strong>HM effort:</strong> early ~5:10&ndash;5:18/km, peak block ~5:00&ndash;5:08/km &nbsp;&middot;&nbsp; <strong>10K-specific touch:</strong> relaxed reps mostly ~4:45&ndash;4:55/km, used sparingly to maintain leg speed &nbsp;&middot;&nbsp; <strong>Stretch HM race pace:</strong> ~4:58&ndash;5:02/km, used only late in the Oct 25 A-race if controlled."
  plan_note_html: "Six runs per week in normal weeks. Sunday stays rest except fixed Sunday race dates. Saturday stays long run except pre-race Saturdays, which become short shakeouts. The Aug 23 half marathon is now a controlled B-race tune-up. Oct 25 is the A half marathon, with sub-1:45 as the stretch outcome. Peak volume remains ~65km before taper. July 12 stays a B benchmark with a two-week 10K-specific touch and mini taper, not a goal race."
