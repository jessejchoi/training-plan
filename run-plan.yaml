  callout_html: "<strong>Strength integration:</strong> Workout A (heavy bilateral
    lower body) follows Monday intervals. Workout B (single-leg and control) follows
    Friday easy run. Never before running on the same day. Deload strength every 4th
    week alongside running cutback weeks. Drop to Workout B only in the final 2 weeks
    before race. Skip strength entirely from Wednesday of race week onward."
  plan_note_html: "&darr; = cutback week &nbsp;&middot;&nbsp; WU = warm-up, CD = cool-down
    &nbsp;&middot;&nbsp; <strong>Recovery runs:</strong> HR cap 140&ndash;145 bpm
    &mdash; whatever pace that requires in Jakarta heat is correct &nbsp;&middot;&nbsp;
    <strong>Easy runs:</strong> upper Z2 HR ceiling (~155&ndash;160 bpm) overrides
    pace always &nbsp;&middot;&nbsp; <strong>Interval rest:</strong> prescribed times
    are minimums &mdash; target 155&ndash;160 bpm before next rep &nbsp;&middot;&nbsp;
    <strong>Threshold:</strong> all paces are cool-weather references &mdash; HR 165&ndash;172
    governs. If you hit HR ceiling before pace target, the HR is correct and the pace
    is aspirational &nbsp;&middot;&nbsp; <strong>Threshold rest:</strong> walk recovery,
    target ~150&ndash;155 bpm before next rep &nbsp;&middot;&nbsp; <strong>Heat protocol:</strong>
    if ambient temp &gt;30&deg;C, add 10&ndash;15s/km to all pace references &mdash;
    HR zones do not change &nbsp;&middot;&nbsp; <strong>Goal calibration:</strong>
    2&ndash;3 weeks out, upgrade the race target only if goal-pace work feels controlled
    and repeatable. If a benchmark session like 3&times;2km or 2&times;3km at 10K
    pace feels smooth with good form and recovery, sub-48 is safe; if the same work
    is controlled at ~4:45/km, consider ~47:30; only push below 47 if multiple race-specific
    sessions support it &nbsp;&middot;&nbsp; <strong>Strength:</strong> Workout A
    after Monday intervals, Workout B after Friday easy run &nbsp;&middot;&nbsp;
    Week 13: preserve race-week freshness above all else"
