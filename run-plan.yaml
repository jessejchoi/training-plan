  pace_guide_html: "<strong>Easy:</strong> effort-first, usually ~6:15&ndash;7:10/km in Jakarta conditions &nbsp;&middot;&nbsp; <strong>Recovery:</strong> softer than easy, often ~6:40&ndash;7:30/km or pure effort after harder Saturdays &nbsp;&middot;&nbsp; <strong>Steady:</strong> ~5:35&ndash;5:55/km early, progressing toward ~5:20&ndash;5:45/km &nbsp;&middot;&nbsp; <strong>Early threshold:</strong> 5:03&ndash;5:12/km &nbsp;&middot;&nbsp; <strong>Peak threshold:</strong> 4:58&ndash;5:06/km; float sets keep the floats controlled, not sprinty &nbsp;&middot;&nbsp; <strong>Early HM effort:</strong> 5:10&ndash;5:18/km &nbsp;&middot;&nbsp; <strong>Peak HM / 1:48 goal rhythm:</strong> 5:05&ndash;5:10/km &nbsp;&middot;&nbsp; <strong>VO2 touches:</strong> early ~4:35&ndash;4:45/km, peak ~4:30&ndash;4:40/km with full recovery &nbsp;&middot;&nbsp; <strong>10K-specific touch:</strong> early ~4:50&ndash;5:00/km, peak ~4:45&ndash;4:55/km, used sparingly."
  plan_note_html: "Weeks 6&ndash;25 use five runs per week by default with Monday and Friday fixed as rest days, Tuesday as the main quality day, Thursday as medium-long or second controlled quality, Saturday as long run or pre-race shakeout, and Sunday as recovery except fixed Sunday race dates. The primary path now skips the July 12 10K and uses that window for smoother HM building; the original 10K race and post-race weeks remain saved as alternatives. The Aug 23 half marathon is a controlled B-race tune-up. Oct 25 is the A half marathon, with 1:48 as the primary target. The post-Aug 23 block adds steady-finish long runs in Weeks 19 and 20, keeps Week 22 as the only peak HM-specific continuous-finish long run, and uses heat-aware effort first in Jakarta conditions."
